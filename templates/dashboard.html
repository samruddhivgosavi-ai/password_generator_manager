<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Recruiter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
     <div class="container mt-5">
         <h2 class="text-center mb-4">Recruiter Dashboard</h2>

         <div class="text-center mt-4">
             <a href="/logout" class="btn btn-danger">Logout</a>
             <a href="/shortlisted" class="btn btn-dark">Shortlisted</a>
             <a href="/rejected" class="btn btn-danger">Rejected</a>
         </div>

         <form method="POST" class="d-flex mb-3">
             <input type="text" name="search" class="form-control me-2" placeholder="Search by name">
             <button type="submit" class="btn btn-dark">Search</button>
         </form>

         <table class="table table-bordered table-striped">
             <tr class="table-dark">
                 <th>ID</th>
                 <th>Name</th>
                 <th>Job Role</th>
                 <th>Score</th>
                 <th>Status</th>
                 <th>Action</th>
             </tr>

             {% for row in data %}
             <tr>
                 <td>{{row[0]}}</td>
                 <td>{{row[1]}}</td>
                 <td>{{row[2]}}</td>
                 <td>{{row[3]}}</td>
                 <td>{{row[4]}}</td>
                 <td>
                     <a href="/edit/{{row[0]}}" class="btn btn-warning btn-sm" onclick="return confirm('Are you sure you want to edit this record?')">Edit</a>

                     <a href="/delete/{{row[0]}}" class="btn btn-danger btn sm"
                     onclick="return confirm('Are you sure you want to delete this record?')">
                         Delete
                     </a>
                 </td>
             </tr>
             {% endfor %}
         </table>
     </div>

</body>
</html>
