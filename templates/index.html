<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Resume Screening</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
     <style>
         body {
             background: linear-gradient(to right, #e3f2fd, #f8f9fa);
         }
         .title {
              font-weight: bold;
              color: #0d6efd;
         }
     </style>
<body>
     <div style="margin-top: 60px;">
     <h3 class="text-center title mb-3"> Smart Resume Analyzer</h3>
     <p class="text-center text-muted">
         Upload your resume and get instant screening results
     </p>
     </div>

     <div class="container d-flex justify-content-center align-items-center" style="height:60vh;">
         <div class="card shadow-lg p-4" style="width:400px;">
      <form action="/upload" method = "post" enctype="multipart/form-data" onsubmit="startTimer()">
          <div class="mb-3">
              <input type="text" class="form-control" placeholder="Enter your Name:" name="name" required>
          </div>

          <div class="mb-3">
              <input type="text" class="form-control" placeholder="Enter your Job Role:" name="job_role" required>
          </div>

          <div class="mb-3">
              <input type="file" class="form-control" placeholder="Upload your Resume:" name="resume" required>
          </div>

         <div class="d-grid">
             <button id="submitBtn" type="submit" class="btn btn-secondary">Submit</button>
         </div>
     </form>
         </div>
     </div>

    <div id="loader" style="display:none; width:100%;" class="text-center mt-4">
    <div class="d-flex flex-column align-items-center">
        <div class="spinner-border text-primary" role="status"></div>

        <p class="mt-3 text-center" style="max-width:400px;">
            Uploading Resume.......<br>
            Please wait.......while we are analyzing your resume
        </p>

        <p id="timer">0 sec</p>
        </div>
</div>

     <script>
         let seconds = 0;

         function startTimer() {
         document.getElementById("loader").style.display = "block";
         document.getElementById("submitBtn").innerText = "Processing......";
         document.getElementById("submitBtn").disabled = true;

         setInterval(function() {
             seconds++;
             document.getElementById("timer").innerText = seconds + " sec";
             },1000);
         }
     </script>
</div>
</body>
</html>
